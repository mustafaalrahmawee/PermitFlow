# PermitFlow local stack (§5.9): backend, database, and MinIO.
# Lives at the project root because the database and MinIO are project-wide
# infrastructure shared by both apps, not api/-only services.
#   api  -> Laravel backend (./api)
# The Nuxt frontend (./app) runs natively on the host (`cd app && npm run dev`),
# not in a container, to keep local resource/heat usage down. It reaches the API
# via the host-published port 8000 (NUXT_PUBLIC_API_BASE=http://localhost:8000/api).
# No async worker, queue, or scheduler — v1 notifications are in-portal and
# synchronous [01_miniworld.md §5; 05_system-design.md §1.4].

services:
  api:
    # PHP 8.4 to match the vendor/ platform requirement (>= 8.4.1).
    image: serversideup/php:8.4-cli
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    volumes:
      - ./api:/var/www/html
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: api
      DB_USERNAME: root
      DB_PASSWORD: ""
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
      AWS_BUCKET: permitflow
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: api
      POSTGRES_USER: root
      # Mirrors the empty DB_PASSWORD in .env; trust auth allows local connections.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - pf_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d api"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - pf_minio_data:/data

  # One-shot: create the documents bucket on startup.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio'; sleep 2; done;
      mc mb --ignore-existing local/permitflow;
      exit 0;
      "

volumes:
  pf_db_data:
  pf_minio_data:
